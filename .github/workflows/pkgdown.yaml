on:
  push:
    branches: [main]
  workflow_dispatch:

name: GitHub Pages

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # ── Python (Sphinx) docs ──────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build tools
        run: sudo apt-get install -y cmake ninja-build

      - name: Install streampress + Sphinx deps
        run: pip install ".[docs]" furo ipykernel

      - name: Build Python docs
        run: |
          cp python/vignettes/streampress.md python/docs/streampress.md
          sphinx-build -b html python/docs _site/python

      # ── R pkgdown ────────────────────────────────────────────────
      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r
          extra-packages: any::pkgdown
          needs: website

      - name: Build pkgdown site
        working-directory: r
        run: Rscript -e 'pkgdown::build_site(dest_dir = "../_site/r", new_process = FALSE, install = TRUE)'

      # ── Root landing page ─────────────────────────────────────────
      - name: Assemble root index
        run: |
          mkdir -p _site
          cp docs/index.html _site/index.html

      # ── Upload artifact ───────────────────────────────────────────
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
